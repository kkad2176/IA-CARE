- categorie: CORTICOIDES
  source_ref: regle_9_corticoide
  atc_prefix:
    - H02
  source_url:
    - "https://pmc.ncbi.nlm.nih.gov/articles/PMC11180513/"
    - "https://pubmed.ncbi.nlm.nih.gov/40522647/"
    - "https://pubmed.ncbi.nlm.nih.gov/32017012/"

  conditions:

# ============================================================
# CAS PARTICULIER — CESARIENNE / ACCOUCHEMENT / DELIVRANCE / HPP
# ============================================================

    - if:
        corticoides: true
        obstetrique: true
        duree_sup_4sem: true
        dose_pred_sup_5: true
      action: ADAPTATION
      note: "Hydrocortisone 100 mg IV début travail puis 50 mg/6h ou 200 mg/24h."


# =========================================================
# STRESS CHIRURGICAL FAIBLE
# =========================================================

    - if:
        corticoides: true
        duree_sup_4sem: true
        dose_pred_sup_10: false
        stress_cortico_faible: true
      action: ADAPTATION
      jour: J0
      note: "Augmenter à 40 mg hydrocortisone/jour (ou 10 mg prednisone). Répartir hydrocortisone : 20 mg matin, 10 mg H+6, 10 mg H+12."

    - if:
        corticoides: true
        duree_sup_4sem: true
        dose_pred_sup_10: true
        stress_cortico_faible: true
      action: POURSUITE
      jour: J0
      note: "Dose ≥ 40 mg hydrocortisone/jour : poursuite sans supplément."

# =========================================================
# STRESS CHIRURGICAL MODERE / ELEVE
# =========================================================

    - if:
        corticoides: true
        duree_sup_4sem: true
        dose_pred_sup_5: true
        stress_cortico_faible: false
      action: ADAPTATION
      note: |
        Poursuivre le traitement hydrocortisone 100 mg IV à l’induction puis 200 mg/24h (ou 50 mg IV/6h).

        Alternative :
        - 50 mg à l’induction puis 25 mg IV toutes les 6h
        - à privilégier si chirurgie à stress modéré de courte durée avec reprise alimentaire précoce
        - ou chez patient diabétique à risque d’hyperglycémie post-opératoire

        Post-opératoire :
        - si jeûne < 24h : relais per os avec hydrocortisone 40 mg/j (20-10-10) ou prednisone 10 mg/j pendant 48h
        - si jeûne > 24h : hydrocortisone 200 mg/24h IV (ou 50 mg/6h) jusqu’à reprise alimentaire
        - si complications : maintenir hydrocortisone IV 50 mg/6h jusqu’à stabilisation



    - if:
        corticoides: true
        duree_sup_4sem: false
      action: POURSUITE
      jour: J0
      note: "Poursuite simple, sans supplémentation."

    - if:
        corticoides: true
        duree_sup_4sem: true
        dose_pred_sup_5: false
      action: POURSUITE
      jour: J0
      note: "Poursuite simple, sans supplémentation."





