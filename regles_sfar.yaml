- categorie: "Anti-Vitamine K (AVK)"
  source_ref: "regle_10_avk"
  source_url:
  - "https://www.has-sante.fr/upload/docs/application/pdf/2008-09/surdosage_en_avk_situations_a_risque_et_accidents_hemorragiques_-_synthese_des_recommandations_v2.pdf"
  - "https://sfar.org/prise-en-charge-des-surdosages-en-antivitamines-k-des-situations-a-risque-hemorragique-et-des-accidents-hemorragiques-chez-les-patients-traites-par-antivitamines-k-en-ville-et-en-milieu-hospitalier/"
  - "https://www.sfed.org/wp-content/uploads/2023/05/hpg-330477-61316-gestion_des_antiagregants_et_anticoagulants_en_endoscopie_document_sfed_2023_a_partir_des_recommandations_bsg_esge_2021_-318879-u-e1d.pdf"
  - "https://inavalverhd.inaheart.org/wp-content/uploads/2025/09/2025-ESC-EACTS-Guidelines-for-the-Management-of-Valvular-Heart-Disease.pdf"
  - "https://pure.eur.nl/ws/portalfiles/portal/182889750/2024_ESC_Guidelines_for_the_management_of_atrial_fibrillation_developed_in_collaboration_with_the_European_Association_for_Cardio-Thoracic_Surgery_EACTS_.pdf"

  atc_prefix:
    - "B01AA"

  conditions:

    # ===== 1. HAUT RISQUE THROMBOEMBOLIQUE (RELAIS) =====

    # Sintrom (acénocoumarol)
    - if:
        valve_mecanique: true
        atc_codes: ["B01AA07"]
      action: "ARRET"
      jour: "J-5"
      note: |
        Relais curatif requis (HBPM 2/j ou HNF).
        Arrêt AVK à J-5.
        Introduction d’une héparine à dose curative le soir :
        24h après la dernière prise d’acénocoumarol (Sintrom®) = J-4.
        J-1 : Hospitalisation systématique.
        Dernière dose d’HBPM le matin OU HNF jusqu’au soir.
        Dosage INR : Si INR ≥ 1,5 : administrer 5 mg de vitamine K per os.
        Faire INR le matin de l’intervention.
        J0 : Jour de l’intervention alors pas d’anticoagulant actif.

    # Préviscan / Fluindione
    - if:
        valve_mecanique: true
        atc_codes: ["B01AA12"]
      action: "ARRET"
      jour: "J-5"
      note: |
        Relais curatif requis (HBPM 2/j ou HNF).
        Arrêt AVK à J-5.
        Introduction d’une héparine à dose curative le soir :
        48h après la dernière prise de fluindione (Previscan®) = J-3.
        J-1 : Hospitalisation systématique.
        Dernière dose d’HBPM le matin OU HNF jusqu’au soir.
        Dosage INR : Si INR ≥ 1,5 : administrer 5 mg de vitamine K per os.
        Faire INR le matin de l’intervention.
        J0 : Jour de l’intervention alors pas d’anticoagulant actif.

    # Coumadine (warfarine)
    - if:
        valve_mecanique: true
        atc_codes: ["B01AA03"]
      action: "ARRET"
      jour: "J-5"
      note: |
        Relais curatif requis (HBPM 2/j ou HNF).
        Arrêt AVK à J-5.
        Introduction d’une héparine à dose curative le soir :
        48h après la dernière prise de warfarine (Coumadine®) = J-3.
        J-1 : Hospitalisation systématique.
        Dernière dose d’HBPM le matin OU HNF jusqu’au soir.
        Dosage INR : Si INR ≥ 1,5 : administrer 5 mg de vitamine K per os.
        Faire INR le matin de l’intervention.
        J0 : Jour de l’intervention alors pas d’anticoagulant actif.

    # ACFA à haut risque
    - if:
        acfa_atcd: true
        atc_codes: ["B01AA07"]
      action: "ARRET"
      jour: "J-5"
      note: |
        Relais curatif requis (HBPM 2/j ou HNF).
        Arrêt AVK à J-5.
        Introduction d’une héparine à dose curative le soir :
        24h après la dernière prise d’acénocoumarol (Sintrom®) = J-4.
        J-1 : Hospitalisation systématique.
        Dernière dose d’HBPM le matin OU HNF jusqu’au soir.
        Dosage INR : Si INR ≥ 1,5 : administrer 5 mg de vitamine K per os.
        Faire INR le matin de l’intervention.
        J0 : Jour de l’intervention alors pas d’anticoagulant actif.

    - if:
        acfa_atcd: true
        atc_codes: ["B01AA12", "B01AA03"]
      action: "ARRET"
      jour: "J-5"
      note: |
        Relais curatif requis (HBPM 2/j ou HNF).
        Arrêt AVK à J-5.
        Introduction d’une héparine à dose curative le soir :
        48h après la dernière prise de fluindione (Previscan®) ou warfarine (Coumadine®) = J-3.
        J-1 : Hospitalisation systématique.
        Dernière dose d’HBPM le matin OU HNF jusqu’au soir.
        Dosage INR : Si INR ≥ 1,5 : administrer 5 mg de vitamine K per os.
        Faire INR le matin de l’intervention.
        J0 : Jour de l’intervention alors pas d’anticoagulant actif.

    # MTEV à haut risque
    - if:
        mtev_haut_risque: true
        atc_codes: ["B01AA07"]
      action: "ARRET"
      jour: "J-5"
      note: |
        Relais curatif requis (HBPM 2/j ou HNF).
        Arrêt AVK à J-5.
        Introduction d’une héparine à dose curative le soir :
        24h après la dernière prise d’acénocoumarol (Sintrom®) = J-4.
        J-1 : Hospitalisation systématique.
        Dernière dose d’HBPM le matin OU HNF jusqu’au soir.
        Dosage INR : Si INR ≥ 1,5 : administrer 5 mg de vitamine K per os.
        Faire INR le matin de l’intervention.
        J0 : Jour de l’intervention alors pas d’anticoagulant actif.

    - if:
        mtev_haut_risque: true
        atc_codes: ["B01AA12", "B01AA03"]
      action: "ARRET"
      jour: "J-5"
      note: |
        Relais curatif requis (HBPM 2/j ou HNF).
        Arrêt AVK à J-5.
        Introduction d’une héparine à dose curative le soir :
        48h après la dernière prise de fluindione (Previscan®) ou warfarine (Coumadine®) = J-3.
        J-1 : Hospitalisation systématique.
        Dernière dose d’HBPM le matin OU HNF jusqu’au soir.
        Dosage INR : Si INR ≥ 1,5 : administrer 5 mg de vitamine K per os.
        Faire INR le matin de l’intervention.
        J0 : Jour de l’intervention alors pas d’anticoagulant actif.

    # ===== 2. NEUROCHIRURGIE =====
    - if:
        type_chir_neuro: "NEUROCHIR_INTRACRANIENNE"
      action: "ARRET"
      jour: "J-5"
      note: |
        Arrêt AVK à J-5 pour tous les AVK.
        Pas de relais systématique.
        Contrôle INR initial entre J-10 et J-7.
        Objectif le matin de l’intervention : INR < 1.2.

    # ===== 3. CHIRURGIE À FAIBLE RISQUE + INR CONNU EN ZONE =====
    - if:
        r_hem: "FAIBLE"
        inr_therapeutique_2_3: true
      action: "POURSUITE"
      jour: "J0"
      note: |
        Chirurgie à risque hémorragique faible : poursuite possible si INR entre 2 et 3.
        Contrôle INR initial entre J-10 et J-7.

    # ===== 4. CHIRURGIE À FAIBLE RISQUE + INR CONNU HORS ZONE =====
    - if:
        r_hem: "FAIBLE"
        inr_hors_zone_2_3: true
      action: "AVIS_SPECIALISE"
      jour: "J0"
      note: |
        Chirurgie à risque hémorragique faible mais INR hors zone thérapeutique attendue (2 à 3).
        Vérifier l’indication, la cible INR et discuter la conduite à tenir.

    # ===== 5. CHIRURGIE À FAIBLE RISQUE + INR NON CONNU =====
    - if:
        r_hem: ["FAIBLE", "NUL"]
        inr_non_connu: true
      action: "POURSUITE"
      jour: "J0"
      note: |
        Chirurgie à risque hémorragique faible : poursuite possible si INR entre 2 et 3.
        Contrôle INR initial entre J-10 et J-7.

    # ===== 6. PAR DÉFAUT =====
    - default: true
      action: "ARRET"
      jour: "J-5"
      note: |
        Arrêt AVK à J-5 pour tous les AVK.
        Pas de relais systématique.
        Contrôle INR initial entre J-10 et J-7.
        Contrôle INR la veille ou matin de l'intervention.


