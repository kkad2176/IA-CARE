- categorie: CORTICOIDES
  source_ref: regle_9_corticoide
  atc_prefix:
    - H02
  source_url:
    - "https://pmc.ncbi.nlm.nih.gov/articles/PMC11180513/"
    - "https://pubmed.ncbi.nlm.nih.gov/40522647/"
    - "https://pubmed.ncbi.nlm.nih.gov/32017012/"

  conditions:

    # ============================================================
    # CAS PARTICULIER — CESARIENNE / ACCOUCHEMENT / DELIVRANCE / HPP
    # ============================================================
    - if:
        corticoides: true
        obstetrique: true
        duree_sup_4sem: true
        dose_pred_sup_5: true
      action: ADAPTATION
      note: "Hydrocortisone 100 mg IV début travail puis 50 mg/6h ou 200 mg/24h."

    # =========================================================
    # STRESS CHIRURGICAL FAIBLE
    # =========================================================
    - if:
        corticoides: true
        duree_sup_4sem: true
        dose_pred_sup_5: true
        stress_cortico_faible: true
        dose_hc_inf_40: true
      action: ADAPTATION
      jour: J0
      note: "Augmenter à 40 mg hydrocortisone/jour (ou 10 mg prednisone). Répartir : 20 mg matin, 10 mg H+6, 10 mg H+12."

    - if:
        corticoides: true
        duree_sup_4sem: true
        dose_pred_sup_5: true
        stress_cortico_faible: true
        dose_hc_sup_40: true
      action: POURSUITE
      jour: J0
      note: "Dose ≥ 40 mg hydrocortisone/jour : poursuite sans supplément."

    # =========================================================
    # STRESS CHIRURGICAL MODERE / ELEVE
    # =========================================================
    - if:
        corticoides: true
        duree_sup_4sem: true
        dose_pred_sup_5: true
        stress_cortico_faible: false
      action: ADAPTATION
      note: |
        Poursuivre le traitement hydrocortisone 100 mg IV à l’induction puis 200 mg/24h (ou 50 mg IV/6h).

        Alternative :
        - 50 mg à l’induction puis 25 mg IV toutes les 6h
        - à privilégier si chirurgie à stress modéré de courte durée avec reprise alimentaire précoce
        - ou chez patient diabétique à risque d’hyperglycémie post-opératoire

        Post-opératoire :
        - si jeûne < 24h : relais per os avec hydrocortisone 40 mg/j (20-10-10) ou prednisone 10 mg/j pendant 48h
        - si jeûne > 24h : hydrocortisone 200 mg/24h IV (ou 50 mg/6h) jusqu’à reprise alimentaire
        - si complications : maintenir hydrocortisone IV 50 mg/6h jusqu’à stabilisation


- categorie: CORTICOIDES TOPIQUES
  atc_prefix:
    - D07
  source_url:
    - "https://pmc.ncbi.nlm.nih.gov/articles/PMC11180513/"
    - "https://pubmed.ncbi.nlm.nih.gov/40522647/"
    - "https://pubmed.ncbi.nlm.nih.gov/32017012/"
  action: POURSUITE
  jour: J0
  note: |
    Corticoïdes topiques (crème, pommade, lotion) : poursuivre sans changement. Aucun impact significatif sur l'anesthésie.

    À ne pas confondre avec l’hydrocortisone orale ou injectable (ATC H02) :
    dans ce cas, appliquer les règles des corticoïdes systémiques (adaptation possible en situation de stress).


- categorie: "Anti-Vitamine K (AVK)"
  source_ref: "regle_10_avk"
  source_url: "https://sfar.org/prise-en-charge-des-surdosages-en-antivitamines-k-des-situations-a-risque-hemorragique-et-des-accidents-hemorragiques-chez-les-patients-traites-par-antivitamines-k-en-ville-et-en-milieu-hospitalier/"
  atc_prefix:
    - "B01AA"

  conditions:

    ##### 1. HAUT RISQUE THROMBOEMBOLIQUE (RELAIS)

    # Sintrom (acénocoumarol)
    - if:
        valve_mecanique: true
        atc_codes: ["B01AA07"]
      action: "ARRET"
      jour: "J-5"
      note: |
        Relais curatif requis (HBPM 2/j ou HNF).
        Arrêt AVK à J-5.
        Début relais héparine à J-4 (Sintrom).
        J-1 : hospitalisation + INR + dernière dose d’HBPM le matin ou HNF jusqu’au soir.
        Si INR ≥ 1.5 : 5 mg vitamine K per os.
        Refaire INR le matin de l’intervention.

    # Préviscan / Fluindione
    - if:
        valve_mecanique: true
        atc_codes: ["B01AA12"]
      action: "ARRET"
      jour: "J-5"
      note: |
        Relais curatif requis (HBPM 2/j ou HNF).
        Arrêt AVK à J-5.
        Début relais héparine à J-3 (Préviscan / Fluindione).
        J-1 : hospitalisation + INR + dernière dose d’HBPM le matin ou HNF jusqu’au soir.
        Si INR ≥ 1.5 : 5 mg vitamine K per os.
        Refaire INR le matin de l’intervention.

    # Coumadine (warfarine)
    - if:
        valve_mecanique: true
        atc_codes: ["B01AA03"]
      action: "ARRET"
      jour: "J-5"
      note: |
        Relais curatif requis (HBPM 2/j ou HNF).
        Arrêt AVK à J-5.
        Début relais héparine à J-3 (Coumadine).
        J-1 : hospitalisation + INR + dernière dose d’HBPM le matin ou HNF jusqu’au soir.
        Si INR ≥ 1.5 : 5 mg vitamine K per os.
        Refaire INR le matin de l’intervention.

    # Autres situations haut risque
    - if:
        acfa_atcd: true
      action: "ARRET"
      jour: "J-5"
      note: |
        Relais curatif requis (HBPM 2/j ou HNF).
        Arrêt AVK à J-5.
        Début relais : J-3 ou J-4 selon le type d’AVK.
        J-1 : hospitalisation + INR.

    - if:
        mtev_haut_risque: true
      action: "ARRET"
      jour: "J-5"
      note: |
        Relais curatif requis (HBPM 2/j ou HNF).
        Arrêt AVK à J-5.
        Début relais : J-3 ou J-4 selon le type d’AVK.
        J-1 : hospitalisation + INR.

    ##### 2. NEUROCHIRURGIE
    - if:
        type_chir_neuro: "NEUROCHIR_INTRACRANIENNE"
      action: "ARRET"
      jour: "J-5"
      note: |
        Arrêt AVK à J-5 pour tous les AVK.
        Pas de relais systématique.
        Contrôle INR initial entre J-10 et J-7.
        Objectif le matin de l’intervention : INR < 1.2.

    ##### 3. CHIRURGIE À FAIBLE RISQUE + INR CONNU EN ZONE
    - if:
        r_hem: "FAIBLE"
        inr_therapeutique_2_3: true
      action: "POURSUITE"
      jour: "J0"
      note: |
        Chirurgie à risque hémorragique faible : poursuite possible si INR entre 2 et 3.
        Contrôle INR initial entre J-10 et J-7.

    ##### 4. CHIRURGIE À FAIBLE RISQUE + INR CONNU HORS ZONE
    - if:
        r_hem: "FAIBLE"
        inr_hors_zone_2_3: true
      action: "AVIS_SPECIALISE"
      jour: "J0"
      note: |
        Chirurgie à risque hémorragique faible mais INR hors zone thérapeutique attendue (2 à 3).
        Vérifier l’indication, la cible INR et discuter la conduite à tenir.

    ##### 5. CHIRURGIE À FAIBLE RISQUE + INR NON CONNU
    - if:
        r_hem: "FAIBLE"
        inr_non_connu: true
      action: "POURSUITE"
      jour: "J0"
      note: |
        Chirurgie à risque hémorragique faible : poursuite possible si INR entre 2 et 3.
        Contrôle INR initial entre J-10 et J-7.

    ##### 6. PAR DÉFAUT
    - default: true
      action: "ARRET"
      jour: "J-5"
      note: |
        Arrêt AVK à J-5 pour tous les AVK.
        Pas de relais systématique.
        Contrôle INR initial entre J-10 et J-7.
        Objectif le matin de l’intervention : INR < 1.5.







