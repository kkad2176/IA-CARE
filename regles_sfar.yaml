  regle_11_heparines:
    categorie: HEPARINES
    sources:
      - "https://sfar.org/wp-content/uploads/2017/10/Bonhomme-Gestion-preoperatoire-du-risque-hemorragique.pdf"





regles_medicaments:
- categorie: SRAA (IEC / ARA II)
  source_ref: regle_1_sraa
  atc_prefix:
  - C09AA
  - C09CA
  conditions:
  - if:
      ind_sraa: HTA
    action: ARRET
    jour: '>=12h'
    note: Risque d'hypotension peropératoire. Pour certaines équipes, poursuite possible sauf si chirurgie à haut risque d’hypotension artérielle ou patient à risque de mauvaise tolérance.
  - default: true
    action: POURSUITE
    jour: J0
    note: 'Indication Insuffisance Cardiaque : maintien recommandé.'



- categorie: "SRAA (Inhibiteurs du système rénine-angiotensine)"
  source_ref: "regle_1_sraa"
  atc_codes:
    - C09BA03
    - C09DX04
  conditions:
    - if: {atc_codes: [C09BA03, C09DX04]}
      action: "ARRET"
      jour: "J-1"
      precision: "dernière prise la veille de l’intervention (J-1)."




- categorie: Diurétiques
  source_ref: regle_2_diuretique
  atc_prefix:
  - C03
  action: Pas de prise le matin
  jour: J0 matin
  note: Sauf si décompensation cardiaque aiguë.



- categorie: Antiarythmiques Amio/Sotalol
  source_ref: regle_3_antiarythmique
  atc_codes:
  - C01BD01
  - C07AA07
  action: POURSUITE
  jour: J0
- categorie: Antiarythmiques Classe I
  source_ref: regle_3_antiarythmique
  atc_prefix:
  - C01BA
  - C01BB
  - C01BC
  action: ARRET
  jour: J-1
  note: Dernière prise J-1.





- categorie: "Pompe à Insuline"
  source_ref: "regle_4_antidiabetique_insuline"
  atc_prefix:
     - "A10A"
  conditions:
    - if:
        dispositif_insuline: "pompe"
        type_chir: "AMBULATOIRE ou chirurgie courte avec ≤ 1 repas jeûné"
      action: "POURSUITE"
      jour: "J0"
      note: "Pompe à insuline : poursuite si ambulatoire ou chirurgie courte avec ≤ 1 repas jeûné.
Maintien possible si intervention courte < 2 h, perturbations du contrôle glycémique non attendues, dispositif visible et à distance du champ opératoire, accord du patient et de l’équipe d’anesthésie, gestion précoce du matériel par le patient en postopératoire, et avis du diabétologue pour adaptation des débits."
    - if:
        dispositif_insuline: "pompe"
        type_chir: "URGENCE"
      action: "ARRET et relais insuline IVSE"
      jour: "Immédiat"
      note: "Pompe à insuline : arrêt immédiat et relais IVSE."
    - if:
        dispositif_insuline: "pompe"
      action: "ARRET DE LA POMPE AU BLOC"
      jour: "J0"
      note: "Pompe à insuline : perfusion de G10% 40 mL/h à partir du premier repas jeûné ; arrêt de la pompe au bloc ; relais IVSE."


- categorie: "Metformine"
  source_ref: "regle_4_antidiabetique_insuline"
  atc_codes:
    - "A10BA02"
  conditions:
    - if:
        type_chir: "AMBULATOIRE ou chirurgie courte avec ≤ 1 repas jeûné"
      action: "POURSUITE"
      jour: "J0"
      note: "Metformine: poursuite si ambulatoire ou chirurgie courte avec ≤ 1 repas jeûné"
    - if:
        type_chir: "URGENCE"
      action: "ARRET"
      jour: "Immédiat"
      note: "Metformine : arrêt immédiat en urgence."
    - default: true
      action: "ADAPTATION"
      jour: "J0 matin"
      note: "Metformine : Ne pas prendre le matin si chirurgie mineure ou majeure ou avec ≥ 2 repas jeûnés."

- categorie: "ADO (Sulfamides, glinides, inhibiteurs alpha-glucosidases, DPP4)"
  source_ref: "regle_4_antidiabetique_insuline"
  atc_prefix:
    - "A10BB"
    - "A10BF"
    - "A10BH"
  conditions:
    - if:
        type_chir: "AMBULATOIRE ou chirurgie courte avec ≤ 1 repas jeûné"
      action: "POURSUITE"
      jour: "J0"
      note: "ADO : poursuite si ambulatoire ou chirurgie courte avec ≤ 1 repas jeûné."
    - if:
        type_chir: "URGENCE"
      action: "ARRET"
      jour: "Immédiat"
      note: "ADO : arrêt immédiat en urgence."
    - default: true
      action: "STOP MATIN"
      jour: "J0 matin"
      note: "ADO : ne pas prendre le matin si chirurgie mineure ou majeure ou avec ≥ 2 repas jeûnés."

- categorie: "SGLT2 (Gliflozines)"
  source_ref: "regle_4_antidiabetique_insuline"
  atc_prefix:
    - "A10BK"
  action: "ARRET"
  jour: "J-3"
  note: "SGLT2 : dernière prise à J-3 (risque d’acidocétose euglycémique). Si prise à moins de J-3 : cétonémie capillaire obligatoire."


- categorie: "GLP-1 (Analogues : Ozempic, Saxenda...)"
  source_ref: "regle_4_antidiabetique_insuline"
  source_url:
    - "https://sfar.org/mise-au-point-traitement-du-diabete-agonistes-recepteurs-glp1-et-anesthesie/"
    - "https://sfar.org/wp-content/uploads/2025/09/Fiches-simplifieges-DiabeGte-2025-V4.pdf"
    - "https://pubmed.ncbi.nlm.nih.gov/39781571/"
    - "https://pmc.ncbi.nlm.nih.gov/articles/PMC11666732/"
  atc_prefix:
    - "A10BJ"
    - "A10BX"
  conditions:

    - if:
        type_chir: "URGENCE"
      action: "ARRET"
      jour: "Immédiat"
      precision: "GLP-1 : arrêt immédiat en urgence. Risque d’estomac plein. Considérer le patient comme estomac plein, réaliser une échographie gastrique si possible et discuter une induction en séquence rapide."


    - default: true
      action: "POURSUITE"
      jour: "J0"
      precision: |
        GLP-1 : Poursuivre (pour DT2 ou obésité). Risque estomac plein. Favoriser ALR, surtout si signe de gastroparésie, ancienneté du DT2, microangiopathie ou autres traitements ralentissant la vidange gastrique. Si AG nécessaire, réaliser une échographie gastrique et discuter une induction en séquence rapide.





- categorie: "Insuline Rapide ou Mixte"
  source_ref: "regle_4_antidiabetique_insuline"
  atc_prefix:
    - "A10AB"
    - "A10AD"
  conditions:
    - if:
        type_chir: "AMBULATOIRE ou chirurgie courte avec ≤ 1 repas jeûné"
      action: "POURSUITE"
      jour: "J0"
      note: "Insuline rapide ou mixte : poursuite si ambulatoire ou chirurgie courte avec ≤ 1 repas jeûné."
    - if:
        type_chir: "URGENCE"
      action: "ARRET"
      jour: "Immédiat"
      note: "Insuline rapide ou mixte : arrêt immédiat en urgence."
    - default: true
      action: "STOP MATIN"
      jour: "J0 matin"
      note: "Insuline rapide ou mixte : pas d’injection le matin si chirurgie mineure ou majeure ou avec ≥ 2 repas jeûnés."

- categorie: "Insuline Basale (Lente)"
  source_ref: "regle_4_antidiabetique_insuline"
  atc_prefix:
    - "A10AE"
  conditions:
    - if:
        type_chir: "AMBULATOIRE ou chirurgie courte avec ≤ 1 repas jeûné"
      action: "POURSUITE"
      jour: "J0"
      note: "Insuline basale :poursuite si ambulatoire ou chirurgie courte avec ≤ 1 repas jeûné."
    - if:
        type_chir: "URGENCE"
      action: "ARRET et relais insuline IVSE"
      jour: "Immédiat"
      note: "Insuline basale : arrêt et relais IVSE"
    - default: true
      action: "STOP MATIN"
      jour: "J0 matin"
      note: "Insuline basale : pas d'injection le matin, sauf chez le DT1 où l'injection doit être maintenue. Si jeûne et insuline lente injectée, perfusion de G10% 40 mL/h à partir du premier repas jeûné."








- categorie: AAP (Anti-agrégants plaquettaires)
  source_ref: regle_5_aap
  atc_codes:
    - B01AC01   # Aspirine
    - B01AC06   # Aspirine
    - B01AC04   # Clopidogrel
    - B01AC24   # Ticagrelor
    - B01AC22   # Prasugrel

  conditions:

    # --- INCOHERENCES ---
    - if: {prev_primaire: true, atc_codes: [B01AC04, B01AC24, B01AC22]}
      action: INFO
      jour: J0
      precision: "Incohérence : inhibiteur P2Y12 non indiqué en prévention primaire."


    - if: {atc_codes: [B01AC01, B01AC06], aspirine_inf_75: true}
      action: INFO
      jour: J0
      precision: "Dose d’aspirine < 75 mg/j : posologie atypique, vérifier la prescription."

    # --- pour NEUROCHIRURGIE ---
    - if: {type_chir_neuro: NEUROCHIR_INTRACRANIENNE, atc_codes: [B01AC01, B01AC06]}
      action: ARRET
      jour: J-5
      precision: "Neurochirurgie intracrânienne ou intrarachidienne : arrêt de l’aspirine à J-5."

    - if: {type_chir_neuro: NEUROCHIR_INTRACRANIENNE, atc_codes: [B01AC04, B01AC24]}
      action: ARRET
      jour: J-7
      precision: "Neurochirurgie intracrânienne ou intrarachidienne : arrêt de l'anti P2Y12 à J-7."

    - if: {type_chir_neuro: NEUROCHIR_INTRACRANIENNE, atc_codes: [B01AC22]}
      action: ARRET
      jour: J-9
      precision: "Neurochirurgie intracrânienne ou intrarachidienne : arrêt du prasugrel à J-9."





    # =========================================================
    #  ALR
    # =========================================================

    - if: {alr: [NEURAXIAL, PROFOND], atc_codes: [B01AC01, B01AC06], aspirine_sup_200: true}
      action: ARRET
      jour: J-3
      precision: "Aspirine > 200 mg : arrêt à J-3. Préférer si possible la rachianesthésie en    ponction unique à la péridurale."
      source_url:
        - "https://journals.lww.com/ejanaesthesiology/fulltext/2022/02000/regional_anaesthesia_in_patients_on_antithrombotic.4.aspx"

    - if: {alr: [NEURAXIAL, PROFOND], atc_codes: [B01AC01, B01AC06]}
      action: POURSUITE
      jour: J0
      precision: "Aspirine ≤200 mg : autorisée pour ALR. Préférer rachianesthésie en ponction unique à la péridurale."

    - if: {alr: [NEURAXIAL, PROFOND], atc_codes: [B01AC04, B01AC24]}
      action: ARRET
      jour: J-5
      precision: "ALR : arrêt du P2Y12."

    - if: {alr: [NEURAXIAL, PROFOND], atc_codes: [B01AC22]}
      action: ARRET
      jour: J-7
      precision: "ALR : arrêt du prasugrel."



    #=========================================================
    # BITHERAPIE AAP – HAUT RISQUE THROMBOTIQUE
    # (stent < 1 mois OU stent < 6 mois à haut risque thrombotique OU IDM < 6 mois)
    # =========================================================

    # FAIBLE
    - if: {bitherapie_aap: true, stent_1m: true, r_hem: FAIBLE}
      action: DIFFERER
      jour: J0
      precision: "Stent ≤ 1 mois : différer la procédure. Si impossibilité, poursuivre les 2 AAP."

    - if: {bitherapie_aap: true, stent_6m_haut_risque: true, r_hem: FAIBLE}
      action: DIFFERER
      jour: J0
      precision: "Stent < 6 mois à haut risque thrombotique : différer la procédure. Si impossibilité, poursuivre les 2 AAP."

    - if: {bitherapie_aap: true, idm_6m: true, r_hem: FAIBLE}
      action: DIFFERER
      jour: J0
      precision: "IDM < 6 mois : différer la procédure. Si impossibilité, poursuivre les 2 AAP."

    # INTERMEDIAIRE – ASPIRINE
    - if: {bitherapie_aap: true, stent_1m: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC01, B01AC06]}
      action: POURSUITE
      jour: J0
      precision: "Stent ≤ 1 mois : Différer la procédure, si impossibilité de différer, poursuivre l’aspirine. Interrompre l'anti-P2Y12"

    - if: {bitherapie_aap: true, stent_6m_haut_risque: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC01, B01AC06]}
      action: POURSUITE
      jour: J0
      precision: "Stent < 6 mois à haut risque thrombotique : Différer la procédure, si impossibilité de différer, poursuivre l’aspirine. Interrompre l'anti-P2Y12"

    - if: {bitherapie_aap: true, idm_6m: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC01, B01AC06]}
      action: POURSUITE
      jour: J0
      precision: "IDM < 6 mois : Différer la procédure, si impossibilité de différer, poursuivre l’aspirine. Interrompre l'anti-P2Y12"

    # INTERMEDIAIRE – CLOPIDOGREL
    - if: {bitherapie_aap: true, stent_1m: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC04]}
      action: ARRET
      jour: J-5
      precision: "Stent ≤ 1 mois :  Différer la procédure, si impossibilité de différer, poursuivre l’aspirine. Interrompre l'anti-P2Y12."

    - if: {bitherapie_aap: true, stent_6m_haut_risque: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC04]}
      action: ARRET
      jour: J-5
      precision: "Stent < 6 mois à haut risque thrombotique : Différer la procédure, si impossibilité de différer, poursuivre l’aspirine. Interrompre l'anti-P2Y12."

    - if: {bitherapie_aap: true, idm_6m: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC04]}
      action: ARRET
      jour: J-5
      precision: "IDM < 6 mois :  Différer la procédure, si impossibilité de différer, poursuivre l’aspirine. Interrompre l'anti-P2Y12."

    # INTERMEDIAIRE – TICAGRELOR
    - if: {bitherapie_aap: true, stent_1m: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC24]}
      action: ARRET
      jour: J-5
      precision: "Stent ≤ 1 mois : Différer la procédure, si impossibilité de différer, poursuivre l’aspirine. Interrompre l'anti-P2Y12."

    - if: {bitherapie_aap: true, stent_6m_haut_risque: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC24]}
      action: ARRET
      jour: J-5
      precision: "Stent < 6 mois à haut risque thrombotique :  Différer la procédure, si impossibilité de différer, poursuivre l’aspirine. Interrompre l'anti-P2Y12."

    - if: {bitherapie_aap: true, idm_6m: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC24]}
      action: ARRET
      jour: J-5
      precision: "IDM < 6 mois :  Différer la procédure, si impossibilité de différer, poursuivre l’aspirine. Interrompre l'anti-P2Y12."

    # INTERMEDIAIRE – PRASUGREL
    - if: {bitherapie_aap: true, stent_1m: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC22]}
      action: ARRET
      jour: J-7
      precision: "Stent ≤ 1 mois : Différer la procédure, si impossibilité de différer, poursuivre l’aspirine. Interrompre l'anti-P2Y12."

    - if: {bitherapie_aap: true, stent_6m_haut_risque: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC22]}
      action: ARRET
      jour: J-7
      precision: "Stent < 6 mois à haut risque thrombotique :  Différer la procédure, si impossibilité de différer, poursuivre l’aspirine. Interrompre l'anti-P2Y12."

    - if: {bitherapie_aap: true, idm_6m: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC22]}
      action: ARRET
      jour: J-7
      precision: "IDM < 6 mois :  Différer la procédure, si impossibilité de différer, poursuivre l’aspirine. Interrompre l'anti-P2Y12."

    # ELEVE / IMPORTANT / MAJEUR – ASPIRINE
    - if: {bitherapie_aap: true, stent_1m: true, r_hem: [ELEVE, IMPORTANT, MAJEUR], atc_codes: [B01AC01, B01AC06]}
      action: ARRET
      jour: J-3
      precision: "Stent ≤ 1 mois :différer la procédure. Si impossibilité, arrêter les 2 AAP et discuter un relais par AAP injectable."

    - if: {bitherapie_aap: true, stent_6m_haut_risque: true, r_hem: [ELEVE, IMPORTANT, MAJEUR], atc_codes: [B01AC01, B01AC06]}
      action: ARRET
      jour: J-3
      precision: "Stent < 6 mois à haut risque thrombotique : différer la procédure. Si impossibilité, arrêter les 2 AAP."

    - if: {bitherapie_aap: true, idm_6m: true, r_hem: [ELEVE, IMPORTANT, MAJEUR], atc_codes: [B01AC01, B01AC06]}
      action: ARRET
      jour: J-3
      precision: "IDM < 6 mois : différer la procédure. Si impossibilité, arrêter les 2 AAP."

    # ELEVE / IMPORTANT / MAJEUR – CLOPIDOGREL / TICAGRELOR
    - if: {bitherapie_aap: true, stent_1m: true, r_hem: [ELEVE, IMPORTANT, MAJEUR], atc_codes: [B01AC04, B01AC24]}
      action: ARRET
      jour: J-5
      precision: "Stent ≤ 1 mois : différer la procédure. Si impossibilité, arrêter les 2 AAP et discuter un relais par AAP injectable."

    - if: {bitherapie_aap: true, stent_6m_haut_risque: true, r_hem: [ELEVE, IMPORTANT, MAJEUR], atc_codes: [B01AC04, B01AC24]}
      action: ARRET
      jour: J-5
      precision: "Stent < 6 mois à haut risque thrombotique : différer la procédure. Si impossibilité, arrêter les 2 AAP."

    - if: {bitherapie_aap: true, idm_6m: true, r_hem: [ELEVE, IMPORTANT, MAJEUR], atc_codes: [B01AC04, B01AC24]}
      action: ARRET
      jour: J-5
      precision: "IDM < 6 mois : différer la procédure. Si impossibilité, arrêter les 2 AAP."

    # ELEVE / IMPORTANT / MAJEUR – PRASUGREL
    - if: {bitherapie_aap: true, stent_1m: true, r_hem: [ELEVE, IMPORTANT, MAJEUR], atc_codes: [B01AC22]}
      action: ARRET
      jour: J-7
      precision: "Stent ≤ 1 mois : différer la procédure. Si impossibilité, arrêter les 2 AAP et discuter un relais par AAP injectable"

    - if: {bitherapie_aap: true, stent_6m_haut_risque: true, r_hem: [ELEVE, IMPORTANT, MAJEUR], atc_codes: [B01AC22]}
      action: ARRET
      jour: J-7
      precision: "Stent < 6 mois à haut risque thrombotique : différer la procédure. Si impossibilité, arrêter les 2 AAP."

    - if: {bitherapie_aap: true, idm_6m: true, r_hem: [ELEVE, IMPORTANT, MAJEUR], atc_codes: [B01AC22]}
      action: ARRET
      jour: J-7
      precision: "IDM < 6 mois : différer la procédure. Si impossibilité, arrêter les 2 AAP."



# --------------------------------------------------------
# 2) BITHERAPIE SANS CRITERE DE HAUT RISQUE THROMBOTIQUE
# (Ou bien aucun des 3 critères ci-dessus)
# --------------------------------------------------------

    # FAIBLE
    - if: {bitherapie_aap: true, aucun_critere_stent: true, r_hem: FAIBLE}
      action: POURSUITE
      jour: J0
      precision: "Poursuivre les 2 AAP."

    # INTERMEDIAIRE – ASPIRINE
    - if: {bitherapie_aap: true, aucun_critere_stent: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC01, B01AC06]}
      action: POURSUITE
      jour: J0
      precision: "Poursuivre l’aspirine et interrompre l’anti-P2Y12."

    # INTERMEDIAIRE – CLOPIDOGREL
    - if: {bitherapie_aap: true, aucun_critere_stent: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC04]}
      action: ARRET
      jour: J-5
      precision: "Poursuivre l’aspirine et interrompre l’anti-P2Y12."

    # INTERMEDIAIRE – TICAGRELOR
    - if: {bitherapie_aap: true, aucun_critere_stent: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC24]}
      action: ARRET
      jour: J-5
      precision: "Poursuivre l’aspirine et interrompre l’anti-P2Y12."

    # INTERMEDIAIRE – PRASUGREL
    - if: {bitherapie_aap: true, aucun_critere_stent: true, r_hem: INTERMEDIAIRE, atc_codes: [B01AC22]}
      action: ARRET
      jour: J-7
      precision: "Poursuivre l’aspirine et interrompre l’anti-P2Y12."

    # ELEVE / IMPORTANT / MAJEUR – ASPIRINE
    - if: {bitherapie_aap: true, aucun_critere_stent: true, r_hem: [ELEVE, IMPORTANT, MAJEUR], atc_codes: [B01AC01, B01AC06]}
      action: ARRET
      jour: J-3
      precision: "Interrompre les 2 AAP."

    # ELEVE / IMPORTANT / MAJEUR – CLOPIDOGREL / TICAGRELOR
    - if: {bitherapie_aap: true, aucun_critere_stent: true, r_hem: [ELEVE, IMPORTANT, MAJEUR], atc_codes: [B01AC04, B01AC24]}
      action: ARRET
      jour: J-5
      precision: "Interrompre les 2 AAP."

    # ELEVE / IMPORTANT / MAJEUR – PRASUGREL
    - if: {bitherapie_aap: true, aucun_critere_stent: true, r_hem: [ELEVE, IMPORTANT, MAJEUR], atc_codes: [B01AC22]}
      action: ARRET
      jour: J-7
      precision: "Interrompre les 2 AAP."


    # =========================================================
    #  PREVENTION PRIMAIRE
    # =========================================================

    - if: {prev_primaire: true, atc_codes: [B01AC01, B01AC06], r_hem: FAIBLE}
      action: DISCUTER
      jour: J0
      precision: "Aspirine en prévention primaire : arrêt ou poursuite selon balance bénéfice-risque."

    - if: {prev_primaire: true, atc_codes: [B01AC01, B01AC06]}
      action: ARRET
      jour: J-3
      precision: "Aspirine en prévention primaire : arrêt à J-3."

    # =========================================================
    #  PREVENTION SECONDAIRE
    # =========================================================

    # ASPIRINE
    - if: {prev_secondaire: true, atc_codes: [B01AC01, B01AC06], r_hem: [FAIBLE, INTERMEDIAIRE]}
      action: POURSUITE
      jour: J0
      precision: "Aspirine (75–300 mg) : poursuite sans relais."


    - if: {prev_secondaire: true, atc_codes: [B01AC01, B01AC06], r_hem: [FAIBLE, INTERMEDIAIRE]}
      action: POURSUITE
      jour: J0
      precision: "Aspirine en prévention secondaire : poursuite."

    - if: {prev_secondaire: true, atc_codes: [B01AC01, B01AC06], r_hem: [ELEVE, IMPORTANT, MAJEUR]}
      action: ARRET
      jour: J-3
      precision: "Aspirine en prévention secondaire : arrêt."

    # CLOPIDOGREL
    - if: {prev_secondaire: true, atc_codes: [B01AC04], r_hem: FAIBLE}
      action: POURSUITE
      jour: J0
      precision: "Clopidogrel : poursuite."

    - if: {prev_secondaire: true, atc_codes: [B01AC04], r_hem: INTERMEDIAIRE}
      action: ARRET
      jour: J-5
      precision: "Arrêt du clopidogrel entre 5 et 7 jours avant la chirurgie, avec un relais par aspirine 75 à 100mg le lendemain de l'arrêt."

    - if: {prev_secondaire: true, atc_codes: [B01AC04], r_hem: [ELEVE, IMPORTANT, MAJEUR]}
      action: ARRET
      jour: J-5
      precision: "Clopidogrel : arrêt."

 




- categorie: AOD
  source_ref: regle_6_aod
  atc_prefix: ["B01AE", "B01AF"]
  conditions:

    # --- RÈGLE 1 : RISQUE TRÈS ÉLEVÉ (NEUROCHIR) ---
    - if: {type_chir_neuro: NEUROCHIR_INTRACRANIENNE}
      action: ARRET
      jour: J-5
      note: "Neurochirurgie : dernière prise J-5 quel que soit l’AOD."

    # ------- RÈGLE 1 BIS : ALR NEURAXIAL ---
    - if: {alr: NEURAXIAL}
      action: ARRET
      jour: J-5
      note: "ALR neuraxial : dernière prise J-5 quel que soit l’AOD."

    # ------ CAS DFG NN CONNU ---
    - if: {dfg_connu: false}
      action: INFO
      note: "DFG inconnu. Rappel : Riva/Apixa J-3 si DFG > 30. Pradaxa J-4 si DFG > 50 ou J-5 si 30-49. Neurochirurgie / ALR neuraxial J-5."

    # ------ RÈGLE 2 : RISQUE ÉLEVÉ / INTERMÉDIAIRE ---
    # Xabans + DFG < 30
    - if: {atc_prefix: [B01AF], dfg_inf_30: true, r_hem: [INTERMEDIAIRE, ELEVE, IMPORTANT, MAJEUR]}
      action: ARRET
      jour: J-3
      note: "Précaution avec -Xaban + DFG < 30. Discuter d’un arrêt plus long et d’un dosage en préopératoire."

    # Dabigatran + DFG 30-49
    - if: {atc_codes: [B01AE07], dfg_30_49: true, r_hem: [INTERMEDIAIRE, ELEVE, IMPORTANT, MAJEUR]}
      action: ARRET
      jour: J-5
      note: "Dabigatran + DFG 30-49 : dernière prise J-5."

    # Dabigatran + DFG < 30
    - if: {atc_codes: [B01AE07], dfg_inf_30: true, r_hem: [INTERMEDIAIRE, ELEVE, IMPORTANT, MAJEUR]}
      action: ARRET
      jour: J-5
      note: "Précaution avec Dabigatran + DFG < 30. Discuter d’un arrêt plus long et d’un dosage en préopératoire."


      # --- RÈGLE 2 : RISQUE ÉLEVÉ / INTERMÉDIAIRE ---
    # Xabans
    - if: {atc_prefix: [B01AF], dfg_ge_30: true, r_hem: [INTERMEDIAIRE, ELEVE, IMPORTANT, MAJEUR]}
      action: ARRET
      jour: J-3
      note: "Xaban + DFG ≥ 30. Dernière prise J-3."

    # Dabigatran
    - if: {atc_codes: [B01AE07], dfg_ge_50: true, r_hem: [INTERMEDIAIRE, ELEVE, IMPORTANT, MAJEUR]}
      action: ARRET
      jour: J-4
      note: "Dabigatran + DFG ≥ 50. Dernière prise J-4."


    # --- RÈGLE 3 : RISQUE FAIBLE ---
    # Dabigatran + DFG < 50
    - if: {r_hem: [FAIBLE, NUL], atc_codes: [B01AE07], dfg_inf_50: true}
      action: ARRET
      jour: J-5
      note: "Précaution avec Dabigatran et DFG < 50. Discuter d’un arrêt plus long (dernière prise J-5) et d’un dosage en préopératoire."

    # Xabans + DFG < 30
    - if: {r_hem: [FAIBLE, NUL], atc_prefix: [B01AF], dfg_inf_30: true}
      action: ARRET
      jour: J-3
      note: "Précaution avec -Xaban + DFG < 30. Discuter d’un arrêt plus long (dernière prise J-3) et d’un dosage en préopératoire."

    # DFG normal
    - if: {r_hem: [FAIBLE, NUL], dfg_connu: true, dfg_ge_30: true}
      action: ARRET
      jour: J-1
      note: "Risque faible. Ne pas prendre la veille au soir et le matin de l'intervention."

    # --- SÉCURITÉ PAR DÉFAUT ---
    - default: true
      action: DOSAGE
      note: "Cas complexe : vérifier le DFG et envisager un dosage."




